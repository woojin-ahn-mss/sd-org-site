<!doctype html>
<html lang="ko" data-theme="dark" data-depth="0">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>홈 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />

  <script type="module">
    import { initTheme } from './assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker" data-kicker>—</p>
      <h1 class="page-title">오늘.</h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 상단 inline stats — 4개 (PRD 4.1, design rule "KPI 카드 X") -->
    <section class="impact-stats" id="home-stats" aria-label="오늘의 지표">
      <div class="imp-stat">
        <div class="imp-label">QUARTER PROGRESS</div>
        <div class="imp-val num" data-stat="quarter-progress">—<span class="u">%</span></div>
        <div class="imp-delta" data-stat-foot="quarter-progress">완료 / 전체</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">DUE IN 7 DAYS</div>
        <div class="imp-val num" data-stat="due-7d">—</div>
        <div class="imp-delta" data-stat-foot="due-7d">다음 7일</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">ETR AWAITING</div>
        <div class="imp-val num" data-stat="etr-awaiting">—</div>
        <div class="imp-delta" data-stat-foot="etr-awaiting">확인 필요</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">FAST-TRACK ACTIVE</div>
        <div class="imp-val num" data-stat="ft-active">—</div>
        <div class="imp-delta" data-stat-foot="ft-active">진행 중 / 전체</div>
      </div>
    </section>

    <!-- 섹션 1 — 확인 필요 ETR -->
    <section>
      <div class="sec-head">
        <h2>확인 필요 · ETR</h2>
        <small><a class="tlink" href="pages/etr.html">전체 ETR →</a></small>
      </div>
      <div id="sec-etr-awaiting" class="row-list"></div>
    </section>

    <!-- 섹션 2 — 이번 주 마감 임박 -->
    <section>
      <div class="sec-head">
        <h2>이번 주 ~ 다음 주 마감</h2>
        <small><a class="tlink" href="pages/roadmap.html">로드맵 →</a></small>
      </div>
      <div id="sec-due-soon" class="row-list"></div>
    </section>

    <!-- 섹션 3 — 패스트트랙 최근 -->
    <section>
      <div class="sec-head">
        <h2>패스트트랙 · 최근</h2>
        <small><a class="tlink" href="pages/fasttrack.html">패스트트랙 →</a></small>
      </div>
      <div id="sec-fasttrack" class="row-list"></div>
    </section>

    <!-- 섹션 4 — 모든 페이지 toc-grid -->
    <section>
      <div class="sec-head"><h2>모든 페이지</h2></div>
      <div class="toc-grid" id="home-toc"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta, PAGES } from './assets/js/nav.js';
    import { renderHome } from './assets/js/pages/home.js';

    renderSidebar({ active: 'home' });
    loadAndApplyMeta('');
    renderHome({ rootRel: '', pages: PAGES });
  </script>
</body>
</html>
