<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Search & Discovery 조직 사이트</title>
<style>
  :root {
    --bg: #080808;
    --bg-elev: #131313;
    --text: #e8e8e8;
    --text-muted: #888;
    --border: #1f1f1f;
    --border-hover: #2a2a2a;
    --accent: #b19eff;
    --accent-bg: rgba(124, 92, 255, 0.15);
    --accent-border: rgba(124, 92, 255, 0.3);
    --mvp-bg: rgba(34, 197, 94, 0.15);
    --mvp-text: #4ade80;
    --v2-bg: rgba(251, 191, 36, 0.12);
    --v2-text: #fbbf24;
    --v3-bg: rgba(148, 163, 184, 0.12);
    --v3-text: #94a3b8;
    --heading-grad: linear-gradient(135deg, #fff 0%, #888 100%);
  }
  [data-theme="light"] {
    --bg: #fafafa;
    --bg-elev: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --border-hover: #cbd5e1;
    --accent: #6d4eff;
    --accent-bg: rgba(109, 78, 255, 0.10);
    --accent-border: rgba(109, 78, 255, 0.25);
    --mvp-bg: rgba(34, 197, 94, 0.12);
    --mvp-text: #16a34a;
    --v2-bg: rgba(251, 191, 36, 0.15);
    --v2-text: #b45309;
    --v3-bg: rgba(148, 163, 184, 0.15);
    --v3-text: #475569;
    --heading-grad: linear-gradient(135deg, #1a1a1a 0%, #6b7280 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: background 0.2s, color 0.2s;
  }
  .theme-toggle {
    position: fixed;
    top: 1.25rem;
    right: 1.25rem;
    width: 38px;
    height: 38px;
    border-radius: 999px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .theme-toggle:hover { border-color: var(--border-hover); }
  .container { max-width: 720px; width: 100%; }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    margin-bottom: 1.25rem;
    letter-spacing: 0.02em;
  }
  h1 {
    font-size: 2.25rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    background: var(--heading-grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }
  .pages {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .page-card {
    padding: 1rem 1.25rem;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: border-color 0.15s;
  }
  .page-card:hover { border-color: var(--border-hover); }
  .page-card .icon { font-size: 1.25rem; }
  .page-card .name { flex: 1; font-size: 0.9rem; font-weight: 500; }
  .status {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .status.todo { background: var(--mvp-bg); color: var(--mvp-text); }
  .meta {
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (max-width: 540px) {
    .pages { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  <div class="container">
    <span class="badge">v0.2 · 셋업 단계</span>
    <h1>Search & Discovery</h1>
    <p class="subtitle">
      조직 로드맵 · 일감 · 리소스를 한 화면에서 관리하고 상위 보고에 활용하는 사이트입니다.
      8개 페이지 전부 풀스펙으로 구현 예정이며, 현재는 랜딩만 배포된 상태입니다.
    </p>

    <div class="pages">
      <div class="page-card"><span class="icon">🏠</span><span class="name">홈</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">📋</span><span class="name">로드맵 (간트)</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">🚀</span><span class="name">진행 현황</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">👥</span><span class="name">리소스</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">📊</span><span class="name">성과</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">🛠</span><span class="name">로드맵 관리</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">⚡</span><span class="name">패스트트랙</span><span class="status todo">예정</span></div>
      <div class="page-card"><span class="icon">📥</span><span class="name">ETR</span><span class="status todo">예정</span></div>
    </div>

    <div class="meta">
      <span>마지막 동기화: —</span>
      <span><a href="PRD.md">PRD 문서</a></span>
    </div>
  </div>

<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    var theme = saved || (prefersLight ? 'light' : 'dark');
    if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    var btn = document.getElementById('themeToggle');
    function render() {
      btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☀️' : '🌙';
    }
    render();
    btn.addEventListener('click', function () {
      var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      var next = cur === 'light' ? 'dark' : 'light';
      if (next === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', next);
      render();
    });
  })();
</script>
</body>
</html>
</content>
