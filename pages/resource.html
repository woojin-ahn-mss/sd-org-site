<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>리소스 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">RESOURCE — TEAM LOAD &amp; BALANCE</p>
      <h1 class="page-title">리소스.</h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 프로젝트별 부하 (가로 막대) -->
    <section>
      <div class="sec-head">
        <h2>프로젝트별 부하</h2>
        <small>막대 클릭으로 드릴다운</small>
      </div>
      <div id="sec-load"></div>
    </section>

    <!-- 담당자 × 프로젝트 히트맵 -->
    <section>
      <div class="sec-head">
        <h2>담당자 × 프로젝트</h2>
        <small>셀 클릭으로 드릴다운</small>
      </div>
      <div id="sec-heat"></div>
    </section>

    <!-- 과부하 알림 -->
    <section>
      <div class="sec-head">
        <h2>과부하 알림</h2>
        <small><span class="num" data-count="cnt-overload">0</span>명</small>
      </div>
      <div id="sec-overload"></div>
    </section>

    <!-- 로딩 host -->
    <div id="resource-host"></div>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderResource } from '../assets/js/pages/resource.js';

    renderSidebar({ active: 'resource' });
    loadAndApplyMeta('../');
    renderResource({ rootRel: '../' });
  </script>
</body>
</html>
