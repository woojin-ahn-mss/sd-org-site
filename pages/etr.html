<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ETR — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">ETR — EXTERNAL REQUESTS · MINE</p>
      <h1 class="page-title">
        ETR.
        <span class="title-badge" data-title-badge role="status" aria-live="polite" hidden></span>
      </h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 메타 배지 -->
    <section class="stats" aria-label="ETR 요약 메타">
      <div class="stat">
        <div class="stat-label">TOTAL</div>
        <div class="stat-val num" data-badge="total">—</div>
        <div class="stat-foot">본인 담당</div>
      </div>
      <div class="stat">
        <div class="stat-label">NEED CHECK</div>
        <div class="stat-val num" data-badge="need">—</div>
        <div class="stat-foot">확인 필요</div>
      </div>
      <div class="stat">
        <div class="stat-label">IN PROGRESS</div>
        <div class="stat-val num" data-badge="inprog">—</div>
        <div class="stat-foot">진행 중</div>
      </div>
      <div class="stat">
        <div class="stat-label">PAGE SIZE</div>
        <div class="stat-val num">50</div>
        <div class="stat-foot">건 단위 페이저</div>
      </div>
    </section>

    <!-- 확인 필요 강조 박스 (Suggestion #7 — landmark) -->
    <section id="sec-alert" role="region" aria-label="확인 필요 ETR" hidden></section>

    <!-- 필터/정렬 -->
    <section id="controls-section" hidden>
      <div class="sec-head">
        <h2>필터 / 정렬</h2>
      </div>
      <div class="filters" id="sec-controls"></div>
    </section>

    <!-- 전체 담당 리스트 (로딩/에러도 여기로 — 리뷰 Important #1) -->
    <section>
      <div class="sec-head">
        <h2>전체 담당</h2>
        <small><span class="num" data-list-count>0</span>건</small>
      </div>
      <div id="sec-list"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderEtr } from '../assets/js/pages/etr.js';
    import { bindJiraLinks } from '../assets/js/jira-link.js';

    renderSidebar({ active: 'etr' });
    loadAndApplyMeta('../');
    renderEtr({ rootRel: '../' });
    bindJiraLinks(document);
  </script>
</body>
</html>
