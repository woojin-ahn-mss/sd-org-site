<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>One 티켓 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">ONE TICKETS — ETR · MSSCXTF · FT · TM · CBP · PBO</p>
      <h1 class="page-title">One 티켓 관리.</h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 컨트롤 (로그인/로그아웃은 사이드바 전역 인증으로 대체) -->
    <section id="sec-auth" class="poc-row" aria-label="One 티켓 컨트롤" style="display:flex; align-items:center; justify-content:flex-end; gap:8px; padding:0 0 10px;">
      <button id="btn-refresh" type="button" class="btn ghost" disabled title="저장된 코멘트·우선순위를 다시 불러옵니다">🔄 새로고침</button>
    </section>

    <!-- 컨트롤: 뷰 / 정렬 + 필터 -->
    <section>
      <div class="sec-head">
        <h2>티켓 리스트 <span class="dim num" data-one-count aria-label="필터 결과 티켓 수"></span></h2>
        <div class="actions">
          <span class="muted dim-mono" style="margin-right:6px">VIEW</span>
          <button type="button" class="tlink active" data-view="all">전체</button>
          <button type="button" class="tlink" data-view="subject">Main Subject</button>
          <span style="width:18px"></span>
          <span class="muted dim-mono" style="margin-right:6px">SORT</span>
          <button type="button" class="tlink active" data-sort="rank">우선순위</button>
          <button type="button" class="tlink" data-sort="created">등록순</button>
          <span style="width:18px"></span>
          <span id="hide-manage-controls"></span>
        </div>
      </div>
      <div class="filters" id="one-filters"></div>
    </section>

    <!-- 리스트 -->
    <section>
      <div id="one-table"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderOneTickets } from '../assets/js/pages/one-tickets.js';
    import { bindJiraLinks } from '../assets/js/jira-link.js';

    renderSidebar({ active: 'one-tickets' });
    loadAndApplyMeta('../');
    renderOneTickets({ rootRel: '../' });
    bindJiraLinks(document);
  </script>
</body>
</html>
