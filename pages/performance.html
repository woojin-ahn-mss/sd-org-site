<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>성과 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">PERFORMANCE — QUARTERLY LAUNCHES &amp; IMPACT</p>
      <h1 class="page-title">성과.</h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 분기 셀렉터 + Export -->
    <section>
      <div class="sec-head">
        <h2>분기 선택</h2>
        <div class="actions">
          <button class="tlink" id="btn-print" type="button">↓ PDF / 인쇄</button>
        </div>
      </div>
      <div class="seg-text" id="quarter-tabs" role="tablist"></div>
    </section>

    <!-- 분기 임팩트 카드 (4개) -->
    <section>
      <div class="sec-head">
        <h2>분기 임팩트</h2>
        <small>출시 과제 수 + KPI 3종</small>
      </div>
      <div class="impact-stats" id="impact-stats"></div>
    </section>

    <!-- 분기 하이라이트 -->
    <section>
      <div class="sec-head">
        <h2>분기 하이라이트</h2>
        <small><span class="num" data-count="cnt-highlights">0</span>건</small>
      </div>
      <div id="sec-highlights"></div>
    </section>

    <!-- 전체 출시 타임라인 -->
    <section>
      <div class="sec-head">
        <h2>분기 타임라인</h2>
      </div>
      <div id="sec-timeline"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderPerformance } from '../assets/js/pages/performance.js';
    import { bindJiraLinks } from '../assets/js/jira-link.js';

    renderSidebar({ active: 'performance' });
    loadAndApplyMeta('../');
    renderPerformance({ rootRel: '../' });
    bindJiraLinks(document); // 타임라인 점 클릭 → Jira
  </script>
</body>
</html>
