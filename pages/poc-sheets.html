<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Raw Data — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>

  <style>
    /* Raw Data 전용 — 넓은 시트 가로 스크롤 + 조밀한 셀 */
    .raw-scroll { overflow: auto; max-width: 100%; border: 1px solid var(--rule); border-radius: var(--radius); }
    .raw-tbl { border-collapse: collapse; font-family: var(--font-mono); font-size: 11.5px; white-space: nowrap; min-width: 100%; }
    .raw-tbl th, .raw-tbl td { border: 1px solid var(--rule); padding: 5px 9px; text-align: left; vertical-align: top; }
    .raw-tbl thead th { position: sticky; top: 0; background: var(--bg-elev); color: var(--text); font-weight: 600; z-index: 1; }
    .raw-tbl td.rownum, .raw-tbl th.rownum { color: var(--faint); text-align: right; background: var(--bg-elev); position: sticky; left: 0; }
    .raw-tbl tbody tr:hover td { background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .raw-tbl td.empty-cell { color: var(--faint); }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">RAW DATA — GOOGLE SHEET SoT</p>
      <h1 class="page-title">Raw Data.</h1>
      <p class="page-lede" data-lede>
        편집 데이터의 원천인 Google Sheet 를 탭별로 읽기전용으로 봅니다. musinsa.com 계정 로그인 필요.
      </p>
    </header>

    <!-- 인증 + 스프레드시트 링크 -->
    <section id="sec-auth" class="poc-card" aria-label="Google 로그인 상태">
      <div class="poc-row" style="gap:10px;align-items:center;">
        <span class="poc-status" id="auth-status">인증 확인 중…</span>
        <span style="flex:1"></span>
        <a id="sheet-link" class="btn ghost" href="#" target="_blank" rel="noopener noreferrer" title="Google Sheet 를 새 탭에서 엽니다">스프레드시트 열기 ↗</a>
        <button id="btn-signin" type="button" class="btn primary" hidden>Google 로그인 →</button>
        <button id="btn-signout" type="button" class="btn ghost" hidden>로그아웃</button>
        <button id="btn-refresh" type="button" class="btn ghost" disabled title="시트 목록·데이터를 다시 불러옵니다">🔄 새로고침</button>
      </div>
      <p id="auth-help" class="muted" style="font-size:12px; margin:10px 0 0; line-height:1.55;">
        musinsa.com Google 계정으로 로그인하면 스프레드시트의 각 탭 데이터를 표로 확인할 수 있습니다. (읽기 전용)
      </p>
    </section>

    <!-- 탭 선택 -->
    <section>
      <div class="sec-head">
        <h2>탭</h2>
        <small id="tab-meta">로그인 후 표시</small>
      </div>
      <div class="filters" id="sheet-tabs"></div>
    </section>

    <!-- 데이터 -->
    <section>
      <div id="raw-table"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderRawData } from '../assets/js/pages/poc-sheets.js';

    renderSidebar({ active: 'poc-sheets' });
    loadAndApplyMeta('../');
    renderRawData({ rootRel: '../' });
  </script>
</body>
</html>
