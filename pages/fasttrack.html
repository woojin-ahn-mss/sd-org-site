<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>패스트트랙 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">FASTTRACK — ETR + ONE LABEL</p>
      <h1 class="page-title">패스트트랙.</h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 상단 5 카드 -->
    <section class="impact-stats five" aria-label="패스트트랙 요약">
      <div class="imp-stat">
        <div class="imp-label">총 인입</div>
        <div class="imp-val num" data-stat="total">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="total">ETR + one</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">트리아지</div>
        <div class="imp-val num" data-stat="triage">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="triage">우선착수</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">일반 과제</div>
        <div class="imp-val num" data-stat="normal">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="normal">검토완료-백로그</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">지난주 인입</div>
        <div class="imp-val num" data-stat="lastweek">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="lastweek">created 기준</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">금주 인입</div>
        <div class="imp-val num" data-stat="thisweek">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="thisweek">트리아지 —건</div>
      </div>
    </section>

    <!-- 상태별 경과 시간 (ETR | FT 두 컬럼) -->
    <section>
      <div class="sec-head">
        <h2>진행 상태 · 평균 경과 시간</h2>
        <small>현재 그 상태에 머무르는 평균 일수 (changelog 기반)</small>
      </div>
      <div class="dwell-grid" id="dwell-grid">
        <div>
          <h3 class="dwell-head">ETR (인입 / 검토)</h3>
          <table class="dwell-tbl" id="dwell-etr"><thead><tr><th>상태</th><th class="num">건수</th><th class="num">평균 일수</th></tr></thead><tbody></tbody></table>
        </div>
        <div>
          <h3 class="dwell-head">FT (실제 진행)</h3>
          <table class="dwell-tbl" id="dwell-ft"><thead><tr><th>상태</th><th class="num">건수</th><th class="num">평균 일수</th></tr></thead><tbody></tbody></table>
        </div>
      </div>
    </section>

    <!-- 필터 (데이터 없으면 통째로 숨김) -->
    <section id="filter-section" hidden>
      <div class="sec-head"><h2>필터</h2></div>
      <div class="filters" id="sec-filters"></div>
    </section>

    <!-- 메인 테이블 -->
    <section>
      <div class="sec-head">
        <h2>요청 목록</h2>
        <small>행 클릭 → 연결 티켓 펼침</small>
      </div>
      <div id="sec-table"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderFasttrack } from '../assets/js/pages/fasttrack.js';
    import { bindJiraLinks } from '../assets/js/jira-link.js';

    renderSidebar({ active: 'fasttrack' });
    loadAndApplyMeta('../');
    renderFasttrack({ rootRel: '../' });
    bindJiraLinks(document);
  </script>
</body>
</html>
