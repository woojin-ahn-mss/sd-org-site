<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>패스트트랙 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">FASTTRACK — ETR + ONE LABEL</p>
      <h1 class="page-title">패스트트랙.</h1>
      <p class="page-lede" data-lede>데이터를 불러오는 중…</p>
    </header>

    <!-- 상단 4 카드 -->
    <section class="impact-stats" aria-label="패스트트랙 요약">
      <div class="imp-stat">
        <div class="imp-label">TOTAL</div>
        <div class="imp-val num" data-stat="total">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="total">전체</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">ACTIVE</div>
        <div class="imp-val num" data-stat="active">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="active">진행 중</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">DONE</div>
        <div class="imp-val num" data-stat="done">—<span class="u">건</span></div>
        <div class="imp-delta" data-stat-foot="done">완료</div>
      </div>
      <div class="imp-stat">
        <div class="imp-label">REPORTERS</div>
        <div class="imp-val num" data-stat="reporters">—<span class="u">명</span></div>
        <div class="imp-delta" data-stat-foot="reporters">요청자</div>
      </div>
    </section>

    <!-- 필터 (데이터 없으면 통째로 숨김) -->
    <section id="filter-section" hidden>
      <div class="sec-head"><h2>필터</h2></div>
      <div class="filters" id="sec-filters"></div>
    </section>

    <!-- 메인 테이블 -->
    <section>
      <div class="sec-head">
        <h2>요청 목록</h2>
        <small>행 클릭 → 연결 티켓 펼침</small>
      </div>
      <div id="sec-table"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="muted">last sync</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderFasttrack } from '../assets/js/pages/fasttrack.js';
    import { bindJiraLinks } from '../assets/js/jira-link.js';

    renderSidebar({ active: 'fasttrack' });
    loadAndApplyMeta('../');
    renderFasttrack({ rootRel: '../' });
    bindJiraLinks(document);
  </script>
</body>
</html>
