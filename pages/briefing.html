<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>분기 발표 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">QUARTERLY BRIEFING</p>
      <h1 class="page-title">분기 발표.</h1>
    </header>

    <div class="deck" id="deck">
      <div class="deck-stage" id="deck-stage"></div>
      <div class="deck-ctrl">
        <button class="deck-btn" id="deck-prev" aria-label="이전 (←)">‹</button>
        <span class="deck-pos num" id="deck-pos">—</span>
        <button class="deck-btn" id="deck-next" aria-label="다음 (→)">›</button>
        <span class="deck-spacer"></span>
        <button class="btn ghost" id="deck-full" title="전체화면 발표">전체화면</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderBriefing } from '../assets/js/pages/briefing.js';

    renderSidebar({ active: 'briefing' });
    loadAndApplyMeta('../');
    renderBriefing({ rootRel: '../' });
  </script>
</body>
</html>
