<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>분기 발표 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">QUARTERLY BRIEFING</p>
      <h1 class="page-title">분기 발표.</h1>
      <p class="page-lede">분기별 집중 주제를 티켓 수 비례 면적으로. 타일을 클릭하면 해당 주제의 Jira 티켓이 펼쳐집니다.</p>
    </header>

    <section>
      <div class="sec-head">
        <div class="seg-text" id="bf-tabs" role="tablist"></div>
        <div class="actions">
          <small class="muted" data-bf-count>—</small>
          <button type="button" class="btn ghost" id="bf-edit" title="주요 주제를 직접 지정 (크게 표시)">주요 표시</button>
          <button type="button" class="btn primary" id="bf-present" title="풀스크린 발표 모드">발표 시작</button>
        </div>
      </div>
      <div class="bf-treemap" id="bf-map"></div>
      <div class="bf-detail" id="bf-detail"></div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderBriefing } from '../assets/js/pages/briefing.js';

    renderSidebar({ active: 'briefing' });
    loadAndApplyMeta('../');
    renderBriefing({ rootRel: '../' });
  </script>
</body>
</html>
