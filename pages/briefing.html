<!doctype html>
<html lang="ko" data-theme="dark" data-depth="1">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>분기 발표 — S&amp;D Console</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />

  <script type="module">
    import { initTheme } from '../assets/js/theme.js';
    initTheme();
  </script>
</head>
<body>
  <div class="page">
    <header>
      <p class="page-kicker">QUARTERLY BRIEFING — 2026 2Q → 3Q</p>
      <h1 class="page-title">분기 발표.</h1>
      <p class="page-lede">목표 → 주제 계위로 묶은 분기 내러티브. 왼쪽 <strong>2Q 회고</strong>(진행·완료), 오른쪽 <strong>3Q 예고</strong>(배포 예정). <span data-bf-summary class="muted"></span></p>
    </header>

    <section>
      <div class="bf-cols">
        <div class="bf-col">
          <div class="bf-col-head bf-col-review">
            <div>
              <div class="bf-col-kicker">RETROSPECTIVE</div>
              <h2 class="bf-col-title">2026 2Q · 회고</h2>
            </div>
            <span class="num bf-col-count" data-bf-count="q2">—</span>
          </div>
          <div id="bf-q2"></div>
        </div>

        <div class="bf-col">
          <div class="bf-col-head bf-col-preview">
            <div>
              <div class="bf-col-kicker">PREVIEW</div>
              <h2 class="bf-col-title">2026 3Q · 예고</h2>
            </div>
            <span class="num bf-col-count" data-bf-count="q3">—</span>
          </div>
          <div id="bf-q3"></div>
        </div>
      </div>
    </section>

    <div class="page-meta">
      <span class="muted">S&amp;D Console</span>
      <span class="right num" data-meta-last-sync>—</span>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, loadAndApplyMeta } from '../assets/js/nav.js';
    import { renderBriefing } from '../assets/js/pages/briefing.js';

    renderSidebar({ active: 'briefing' });
    loadAndApplyMeta('../');
    renderBriefing({ rootRel: '../' });
  </script>
</body>
</html>
